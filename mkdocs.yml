site_name: rabbitpy
site_description: A pure python, thread-safe, minimalistic and pythonic RabbitMQ client library
site_url: https://gmr.github.io/rabbitpy/
repo_url: https://github.com/gmr/rabbitpy
repo_name: gmr/rabbitpy

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.footer
    - navigation.sections
    - navigation.top

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets

nav:
  - Home: index.md
  - API Reference:
    - Connection: api/connection.md
    - Exceptions: api/exceptions.md
  - Examples:
    - Consumer: examples/consumer.md
    - Publisher: examples/publisher.md
    - Message Getter: examples/getter.md
  - Threading Notes: threads.md
  - Version History: history.md
